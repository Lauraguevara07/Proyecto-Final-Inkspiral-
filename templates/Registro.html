<!-- Formulario de Registro -->
        <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="articulo p-4 shadow rounded bg-white">
                <h2>Formulario de Registro Usuario</h2>
                <form action="" method="post">
                    <label for="">Nombre:</label><i class="fa-solid fa-user-pen"></i><br>
                    <input type="text" name="nombre" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>

                    <label for="">Email:</label><i class="fa-solid fa-user-pen"></i>
                    <input type="email" name="email" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>

                    <label for="">Contraseña:</label><i class="fa-solid fa-user-pen"></i>
                    <input type="password" name="password" required style="width: 100%; padding: 8px; margin-bottom: 10px;" minlength="6"><br>

                    <!-- Confirmar contraseña -->
                    <label for="">Confirmar Contraseña</label><i class="fa-solid fa-user-pen"></i><br>
                    <input type="password" name="confirm_password" required style="width: 100%; padding: 8px; margin-bottom: 10px;" minlength="6"><br>

                    <p>Ya tienes cuenta? <a href="./Inicio Sesion.html">Iniciar Sesion</a></p>

                    <button type="submit" style="margin-top: 10px; padding: 10px 20px; background-color: rgb(127, 178, 255); color: white; border: none; border-radius: 5px;">Enviar</button>

                </form>
            </div>
        </div>
